<svg viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .aperture-stroke { stroke-width: 1.83; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Aperture Variant - Concentric hexagons -->
  <g id="ocx-aperture-variant">
    <!-- Outer hexagon -->
    <polygon points="20,7.5 25.49,11.25 25.49,18.75 20,22.5 14.51,18.75 14.51,11.25" 
             fill="none" 
             stroke="#000000" 
             class="aperture-stroke"/>
    
    <!-- Concentric inner hexagon -->
    <polygon points="20,10.69 23.095,12.34 23.095,17.66 20,19.31 16.905,17.66 16.905,12.34" 
             fill="none" 
             stroke="#000000" 
             class="aperture-stroke"/>
    
    <!-- Core dot -->
    <circle cx="20" cy="15" r="1" fill="#000000"/>
  </g>
</svg>
