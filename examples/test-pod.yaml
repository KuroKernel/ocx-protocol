apiVersion: v1
kind: Pod
metadata:
  name: ocx-demo-pod
  namespace: default
  annotations:
    ocx-inject: "true"
    ocx-cycles: "50000"
    ocx-profile: "v1-min"
    ocx-keystore: "default"
  labels:
    app: ocx-demo
spec:
  containers:
  - name: demo-app
    image: nginx:alpine
    ports:
    - containerPort: 80
    command: ["sh", "-c"]
    args:
    - |
      echo "OCX Demo Application Starting..."
      echo "OCX Binary: $(which ocx || echo 'Not found')"
      echo "OCX Version: $(ocx --version 2>/dev/null || echo 'Failed to get version')"
      echo "OCX Environment:"
      env | grep OCX || echo "No OCX environment variables"
      echo "Starting nginx..."
      nginx -g "daemon off;"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
