apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ocx-webhook
  namespace: ocx-system
  labels:
    app.kubernetes.io/name: ocx-webhook
    app.kubernetes.io/part-of: ocx-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ocx-webhook
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 8443
  - from: []  # Allow metrics scraping from any pod
    ports:
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: ocx-system
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ocx-server
    ports:
    - protocol: TCP
      port: 8080
  - to: []  # Allow DNS resolution
    ports:
    - protocol: UDP
      port: 53
