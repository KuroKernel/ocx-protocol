apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocx-protocol
  labels:
    app: ocx-protocol
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ocx-protocol
  template:
    metadata:
      labels:
        app: ocx-protocol
    spec:
      containers:
      - name: ocx-protocol
        image: ocx-protocol:latest
        ports:
        - containerPort: 8080
        env:
        - name: OCX_API_KEYS
          valueFrom:
            secretKeyRef:
              name: ocx-secrets
              key: api-keys
        - name: OCX_DB_URL
          valueFrom:
            secretKeyRef:
              name: ocx-secrets
              key: db-url
        - name: OCX_SIGNING_KEY_PEM
          valueFrom:
            secretKeyRef:
              name: ocx-secrets
              key: signing-key
        - name: OCX_LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /livez
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
