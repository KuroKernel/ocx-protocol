# OCX Protocol Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: ocx-protocol
  labels:
    app.kubernetes.io/name: ocx-protocol
    app.kubernetes.io/component: infrastructure
---
# Resource Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ocx-quota
  namespace: ocx-protocol
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "10"
    persistentvolumeclaims: "10"
---
# Network Policy - Default deny ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: ocx-protocol
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Network Policy - Allow internal communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: ocx-protocol
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ocx-protocol
