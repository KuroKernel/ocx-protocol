syntax = "proto3";

package envoy.extensions.filters.http.ocx.v3;

import "envoy/type/v3/http.proto";
import "google/protobuf/duration.proto";
import "udpa/annotations/status.proto";
import "udpa/annotations/versioning.proto";
import "validate/validate.proto";

option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/filters/http/ocx/v3;ocxv3";
option java_package = "io.envoyproxy.envoy.extensions.filters.http.ocx.v3";
option java_outer_classname = "OcxFilterProto";
option java_multiple_files = true;
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// OCX Filter configuration
message OCXFilter {
  option (udpa.annotations.versioning).previous_message_type = "envoy.config.filter.http.ocx.v2.OCXFilter";

  // OCX server URL for verification requests
  string ocx_server_url = 1 [(validate.rules).string.uri = true];

  // API key for OCX server authentication
  string api_key = 2 [(validate.rules).string.min_len = 1];

  // Whether to fail closed on verification failure
  bool fail_closed = 3;

  // Request timeout for OCX server calls
  google.protobuf.Duration timeout = 4 [(validate.rules).duration.required = true];

  // Maximum retry attempts for OCX server calls
  uint32 max_retries = 5 [(validate.rules).uint32.lte = 5];

  // Headers to include in verification requests
  repeated string include_headers = 6;

  // Headers to exclude from verification requests
  repeated string exclude_headers = 7;
}
