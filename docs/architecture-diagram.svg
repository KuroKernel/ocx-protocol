<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .actor { fill: #fdf6e3; stroke: #333; stroke-width: 1px; color: #111; }
      .adapter { fill: #e8f0ff; stroke: #4e79a7; stroke-width: 1px; color: #0b2545; }
      .api { fill: #e8f5e9; stroke: #2e7d32; color: #0a2f14; }
      .core { fill: #fff3e0; stroke: #ef6c00; color: #3b2200; }
      .verify { fill: #e3f2fd; stroke: #1565c0; color: #0a1e3b; }
      .store { fill: #ede7f6; stroke: #5e35b1; color: #28124d; }
      .policy { fill: #fffde7; stroke: #f9a825; color: #443600; }
      .analytics { fill: #e0f7f7; stroke: #00796b; color: #003d39; }
      .gov { fill: #fce4ec; stroke: #ad1457; color: #520a26; }
      .security { fill: #f3e5f5; stroke: #6a1b9a; color: #2f0a4d; }
      .title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .subtitle { font-family: Arial, sans-serif; font-size: 12px; }
      .legend { font-family: Arial, sans-serif; font-size: 10px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title" font-size="18">OCX Protocol v1.0.0-rc.1 - Master Architecture</text>
  
  <!-- Layer 0: Actors -->
  <rect x="50" y="60" width="1100" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="60" y="80" class="title">🎭 Actors & Stakeholders</text>
  <rect x="70" y="90" width="200" height="40" class="actor" rx="3"/>
  <text x="80" y="110" class="subtitle">Developers / Integrators</text>
  <rect x="290" y="90" width="200" height="40" class="actor" rx="3"/>
  <text x="300" y="110" class="subtitle">Operators / FinOps / Compliance</text>
  <rect x="510" y="90" width="200" height="40" class="actor" rx="3"/>
  <text x="520" y="110" class="subtitle">Auditors / Insurers / Regulators</text>
  <rect x="730" y="90" width="200" height="40" class="actor" rx="3"/>
  <text x="740" y="110" class="subtitle">End Users / Customers</text>
  
  <!-- Layer 1: Adapters -->
  <rect x="50" y="160" width="1100" height="100" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="60" y="180" class="title">🔌 Adapters (Drop-ins)</text>
  <rect x="70" y="190" width="150" height="60" class="adapter" rx="3"/>
  <text x="80" y="210" class="subtitle">GitHub Action</text>
  <text x="80" y="225" class="subtitle">ocx-verify-action</text>
  <rect x="240" y="190" width="150" height="60" class="adapter" rx="3"/>
  <text x="250" y="210" class="subtitle">Kubernetes Webhook</text>
  <text x="250" y="225" class="subtitle">label: ocx=on</text>
  <rect x="410" y="190" width="150" height="60" class="adapter" rx="3"/>
  <text x="420" y="210" class="subtitle">Airflow Operator</text>
  <text x="420" y="225" class="subtitle">@ocx.task</text>
  <rect x="580" y="190" width="150" height="60" class="adapter" rx="3"/>
  <text x="590" y="210" class="subtitle">FFmpeg Filter</text>
  <text x="590" y="225" class="subtitle">-vf ocx=emit=1</text>
  <rect x="750" y="190" width="150" height="60" class="adapter" rx="3"/>
  <text x="760" y="210" class="subtitle">PyTorch Wrapper</text>
  <text x="760" y="225" class="subtitle">ocx.exec(...)</text>
  <rect x="920" y="190" width="150" height="60" class="adapter" rx="3"/>
  <text x="930" y="210" class="subtitle">CLI Wrapper</text>
  <text x="930" y="225" class="subtitle">ocx run -- cmd</text>
  
  <!-- Layer 2: API/SDK -->
  <rect x="50" y="280" width="1100" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="60" y="300" class="title">⚡ Ingress (CLI / SDK / API)</text>
  <rect x="70" y="310" width="200" height="40" class="api" rx="3"/>
  <text x="80" y="330" class="subtitle">minimal-cli</text>
  <rect x="290" y="310" width="200" height="40" class="api" rx="3"/>
  <text x="300" y="330" class="subtitle">SDKs (Go/Python/Rust)</text>
  <rect x="510" y="310" width="200" height="40" class="api" rx="3"/>
  <text x="520" y="330" class="subtitle">REST API</text>
  
  <!-- Layer 3: OCX Core -->
  <rect x="50" y="380" width="1100" height="120" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="60" y="400" class="title">🔥 OCX Core (v1-min)</text>
  <rect x="70" y="410" width="150" height="80" class="core" rx="3"/>
  <text x="80" y="430" class="subtitle">Spec v1-min (FROZEN)</text>
  <text x="80" y="445" class="subtitle">profile_id=1</text>
  <rect x="240" y="410" width="150" height="80" class="core" rx="3"/>
  <text x="250" y="430" class="subtitle">Deterministic VM</text>
  <text x="250" y="445" class="subtitle">(no clock/syscalls/threads/FP)</text>
  <rect x="410" y="410" width="150" height="80" class="core" rx="3"/>
  <text x="420" y="430" class="subtitle">Cycle Meter</text>
  <text x="420" y="445" class="subtitle">(alpha,beta,gamma)</text>
  <rect x="580" y="410" width="150" height="80" class="core" rx="3"/>
  <text x="590" y="430" class="subtitle">Transcript Builder</text>
  <text x="590" y="445" class="subtitle">Hash chain → Merkle root</text>
  <rect x="750" y="410" width="150" height="80" class="core" rx="3"/>
  <text x="760" y="430" class="subtitle">CBOR Serializer</text>
  <text x="760" y="445" class="subtitle">(canonical, strict)</text>
  <rect x="920" y="410" width="150" height="80" class="core" rx="3"/>
  <text x="930" y="430" class="subtitle">Ed25519 Signer</text>
  <text x="930" y="445" class="subtitle">Receipt Emitter</text>
  
  <!-- Layer 4: Conformance -->
  <rect x="50" y="520" width="1100" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="60" y="540" class="title">✅ Truth & Conformance</text>
  <rect x="70" y="550" width="200" height="40" class="verify" rx="3"/>
  <text x="80" y="570" class="subtitle">CRI-lite (Executable Spec)</text>
  <rect x="290" y="550" width="200" height="40" class="verify" rx="3"/>
  <text x="300" y="570" class="subtitle">Conformance Suite</text>
  <rect x="510" y="550" width="200" height="40" class="verify" rx="3"/>
  <text x="520" y="570" class="subtitle">Cross-Arch Determinism</text>
  
  <!-- Layer 5: Verify & Storage -->
  <rect x="50" y="620" width="1100" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="60" y="640" class="title">🔍 Verify & Storage</text>
  <rect x="70" y="650" width="200" height="40" class="verify" rx="3"/>
  <text x="80" y="670" class="subtitle">Offline Verifier</text>
  <rect x="290" y="650" width="200" height="40" class="verify" rx="3"/>
  <text x="300" y="670" class="subtitle">Hosted Verify API</text>
  <rect x="510" y="650" width="200" height="40" class="store" rx="3"/>
  <text x="520" y="670" class="subtitle">Receipts Store / Index</text>
  <rect x="730" y="650" width="200" height="40" class="store" rx="3"/>
  <text x="740" y="670" class="subtitle">Exporters</text>
  
  <!-- Key Principles -->
  <rect x="50" y="720" width="1100" height="60" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="60" y="740" class="title">🎯 Key Principles</text>
  <text x="70" y="760" class="legend">① Proof, not promises: receipts encode what ran</text>
  <text x="300" y="760" class="legend">② Offline verify: no network needed</text>
  <text x="530" y="760" class="legend">③ Cross-arch determinism: identical hashes</text>
  <text x="760" y="760" class="legend">④ Frozen spec + profiles: v1-min never changes</text>
  
  <!-- Arrows showing data flow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- Flow arrows -->
  <line x1="170" y1="140" x2="170" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="170" y1="260" x2="170" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="170" y1="360" x2="170" y2="380" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="170" y1="500" x2="170" y2="520" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="170" y1="600" x2="170" y2="620" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Legend -->
  <rect x="50" y="790" width="1100" height="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="60" y="800" class="legend">Legend: → Solid: control/API call | -.-> Dashed: data artifact | ..-> Dotted: optional/hosted/policy-layer</text>
</svg>
