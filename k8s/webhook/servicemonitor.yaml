apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ocx-webhook
  namespace: ocx-system
  labels:
    app.kubernetes.io/name: ocx-webhook
    app.kubernetes.io/part-of: ocx-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ocx-webhook
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
