apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ocx-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ocx-webhook.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "ocx-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.metricsPort }}"
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ocx-webhook.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ocx-webhook.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: webhook
              containerPort: 8443
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          env:
            - name: WEBHOOK_PORT
              value: "8443"
            - name: METRICS_PORT
              value: "{{ .Values.service.metricsPort | quote }}"
            - name: TLS_CERT_FILE
              value: "/etc/certs/tls.crt"
            - name: TLS_KEY_FILE
              value: "/etc/certs/tls.key"
            - name: OCX_SERVER_URL
              value: {{ .Values.webhook.ocxServerURL | quote }}
            - name: DEBUG_MODE
              value: {{ .Values.webhook.debugMode | quote }}
            - name: OCX_IMAGE
              value: {{ .Values.webhook.ocxImage | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: certs
              mountPath: /etc/certs
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: certs
          secret:
            secretName: {{ include "ocx-webhook.fullname" . }}-certs
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
