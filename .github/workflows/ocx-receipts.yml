name: OCX - Determinism & Verify
on: [push, pull_request]
jobs:
  receipts:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22.x' }

      - name: Build
        run: |
          go build -o server ./cmd/server
          go build -o verify-standalone ./cmd/tools/verify-standalone

      - name: Start server
        env:
          OCX_API_KEY: ci-key
          OCX_DISABLE_DB: "true"
          OCX_PORT: "9001"
        run: |
          ./server --log-level warn > /tmp/ocx.log 2>&1 & echo $! > /tmp/pid
          for i in {1..40}; do curl -fsS http://127.0.0.1:9001/readyz && break; sleep 0.25; done

      - name: Determinism x100
        run: |
          printf '#!/usr/bin/env bash\necho OK\n' > artifacts/hello.sh && chmod +x artifacts/hello.sh
          H=$(sha256sum artifacts/hello.sh | awk '{print $1}')
          IN=$(printf "demo" | xxd -p -c 256)
          REQ=$(jq -n --arg h "$H" --arg in "$IN" '{artifact_hash:$h, input:$in}')
          jq -r .receipt_b64 <(curl -fsS -H "X-API-Key: ci-key" -H "Content-Type: application/json" -d "$REQ" http://127.0.0.1:9001/api/v1/execute) | base64 -d > /tmp/r0.cbor
          for i in {1..100}; do
            R=$(curl -fsS -H "X-API-Key: ci-key" -H "Content-Type: application/json" -d "$REQ" http://127.0.0.1:9001/api/v1/execute)
            echo "$R" | jq -r .receipt_b64 | base64 -d > /tmp/ri.cbor
            diff -q /tmp/r0.cbor /tmp/ri.cbor
          done

      - name: Verify & Tamper
        run: |
          R=$(curl -fsS http://127.0.0.1:9001/readyz >/dev/null || true)
          H=$(sha256sum artifacts/hello.sh | awk '{print $1}')
          IN=$(printf "demo" | xxd -p -c 256)
          REQ=$(jq -n --arg h "$H" --arg in "$IN" '{artifact_hash:$h, input:$in}')
          A=$(curl -fsS -H "X-API-Key: ci-key" -H "Content-Type: application/json" -d "$REQ" http://127.0.0.1:9001/api/v1/execute)
          echo "$A" | jq -r .receipt_b64 | base64 -d > /tmp/rcpt.cbor
          PUB=$(echo "$A" | jq -r '.verification.public_key // empty')
          if [ -n "$PUB" ]; then printf "%s" "$PUB" | xxd -r -p | base64 > /tmp/pub.b64; else cp ops/keys/ocx_public.b64 /tmp/pub.b64; fi
          ./verify-standalone /tmp/rcpt.cbor /tmp/pub.b64
          cp /tmp/rcpt.cbor /tmp/bad.cbor
          printf '\x00' | dd of=/tmp/bad.cbor bs=1 seek=10 count=1 conv=notrunc
          ! ./verify-standalone /tmp/bad.cbor /tmp/pub.b64
