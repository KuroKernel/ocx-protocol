# Default values for ocx-webhook
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: ocx-webhook
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 443
  metricsPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ocx-webhook.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: ocx-webhook
        topologyKey: kubernetes.io/hostname

# Webhook configuration
webhook:
  # OCX server URL for readiness checks
  ocxServerURL: "http://ocx-server:8080"
  # Debug mode
  debugMode: false
  # OCX image for injection
  ocxImage: "ocx-protocol:latest"
  # Default injection parameters
  defaultCycles: "10000"
  defaultProfile: "v1-min"
  defaultKeystore: "default"

# Certificate configuration
certificates:
  # Use cert-manager for certificate management
  certManager:
    enabled: false
    issuer: ""
  # Self-signed certificates
  selfSigned:
    enabled: true

# Network policy
networkPolicy:
  enabled: true

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Service monitor for Prometheus
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s

# Namespace selector for webhook
namespaceSelector:
  # Namespaces with this label will be subject to webhook mutation
  enforceLabel: "ocx.dev/enforce"
  enforceValue: "true"

# Object selector for webhook
objectSelector:
  # Pods with this label will be mutated
  enableLabel: "ocx.dev/enable"
  enableValue: "true"
