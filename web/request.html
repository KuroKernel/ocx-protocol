<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Access - OCX Protocol</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.5;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            color: #666666;
        }
        
        .form {
            border: 1px solid #e0e0e0;
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #000000;
            margin-bottom: 6px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            font-size: 14px;
            color: #000000;
            background: #ffffff;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #000000;
        }
        
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #000000;
            color: #ffffff;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .submit-btn:hover {
            background: #333333;
        }
        
        .submit-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666666;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            color: #000000;
        }
        
        .success {
            text-align: center;
            padding: 40px 30px;
            border: 1px solid #e0e0e0;
        }
        
        .success h2 {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 12px;
        }
        
        .success p {
            font-size: 14px;
            color: #666666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Request Access</h1>
            <p>Join the waitlist for OCX Protocol early access</p>
        </div>

        <div id="form-container">
            <form class="form" id="waitlist-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="organization">Organization</label>
                    <input type="text" id="organization" name="organization" placeholder="Company, research lab, etc.">
                </div>
                
                <div class="form-group">
                    <label for="use_case">Use Case</label>
                    <textarea id="use_case" name="use_case" placeholder="What compute workloads are you planning to run?" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="submit-btn">Submit Request</button>
            </form>
        </div>

        <div id="success-container" style="display: none;">
            <div class="success">
                <h2>Request Submitted</h2>
                <p>We'll contact you within 48 hours with access details.</p>
            </div>
        </div>

        <a href="/" class="back-link">← Back to OCX Protocol</a>
    </div>

    <script>
        document.getElementById('waitlist-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const formContainer = document.getElementById('form-container');
            const successContainer = document.getElementById('success-container');
            
            submitBtn.textContent = 'Submitting...';
            submitBtn.disabled = true;
            
            // Get form data
            const formData = new FormData(this);
            
            // For now, just show success (you'll replace this with actual form submission)
            setTimeout(() => {
                formContainer.style.display = 'none';
                successContainer.style.display = 'block';
            }, 1000);
            
            // Actual submission would look like:
            /*
            fetch(this.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    formContainer.style.display = 'none';
                    successContainer.style.display = 'block';
                } else {
                    submitBtn.textContent = 'Submit Request';
                    submitBtn.disabled = false;
                    alert('Error submitting form. Please try again.');
                }
            });
            */
        });
    </script>
</body>
</html>
