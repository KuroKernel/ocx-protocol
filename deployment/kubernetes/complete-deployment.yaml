apiVersion: v1
kind: Namespace
metadata:
  name: ocx-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocx-server
  namespace: ocx-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ocx-server
  template:
    metadata:
      labels:
        app: ocx-server
    spec:
      containers:
      - name: ocx-server
        image: ocx-protocol:rust
        ports:
        - containerPort: 8080
        env:
        - name: OCX_USE_RUST_VERIFIER
          value: "true"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ocx-secrets
              key: database-url
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ocx-server
  namespace: ocx-system
spec:
  selector:
    app: ocx-server
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: ocx-filter
  namespace: ocx-system
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.ocx
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.ocx.v3.OCXFilter
          ocx_server_url: "http://ocx-server.ocx-system:8080"
          api_key: "your-api-key-here"
          fail_closed: false
