# OCX Protocol Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocx-server
  namespace: ocx-protocol
  labels:
    app.kubernetes.io/name: ocx-server
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ocx-protocol
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ocx-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ocx-server
        app.kubernetes.io/name: ocx-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ocx-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # Anti-affinity for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ocx-server
                topologyKey: kubernetes.io/hostname

      containers:
        - name: ocx-server
          image: ghcr.io/kurokernel/ocx-protocol:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP

          env:
            - name: OCX_ENV
              value: "production"
            - name: OCX_STRICT_MODE
              value: "true"
            - name: OCX_LOG_LEVEL
              value: "info"
            - name: OCX_METRICS_ENABLED
              value: "true"
            - name: OCX_WORKERS
              value: "4"
            - name: OCX_DB_PATH
              value: "/app/data/ocx.db"
            - name: OCX_BADGER_PATH
              value: "/app/data/badger"
            - name: OCX_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ocx-secrets
                  key: redis-url
            - name: OCX_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: ocx-secrets
                  key: signing-key

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/config
              readOnly: true

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ocx-data-pvc
        - name: config
          configMap:
            name: ocx-config

      terminationGracePeriodSeconds: 30
---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ocx-server
  namespace: ocx-protocol
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: ocx-server
  namespace: ocx-protocol
  labels:
    app.kubernetes.io/name: ocx-server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  selector:
    app: ocx-server
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ocx-server-hpa
  namespace: ocx-protocol
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ocx-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ocx-server-pdb
  namespace: ocx-protocol
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ocx-server
