<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One OCX-verified inference call · Sequence</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-soft:    #7a8399;
      --color-accent:  #059669;
      --color-link:    #2e5aa8;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Geist', sans-serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .frame { max-width: 1320px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-sans);
      font-size: clamp(1.75rem, 2.6vw + 0.75rem, 2.25rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--color-muted);
      margin-bottom: 1.75rem;
      max-width: 680px;
      line-height: 1.5;
    }

    svg { width: 100%; min-width: 1080px; display: block; }
    /* Mobile-embed adjustments — tighten chrome so the diagram fills
       more of the 1080px-wide iframe the parent component renders. */
    @media (max-width: 720px) {
      body { padding: 1.25rem 1rem 2rem; }
      .frame { max-width: 100%; }
      h1 { font-size: 1.25rem !important; line-height: 1.2 !important; margin-bottom: 0.35rem !important; }
      .subtitle { font-size: 0.85rem !important; margin-bottom: 1rem !important; }
    }

  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">OCX · Verified Inference</p>
    <h1>One inference call, signed once, verifiable forever</h1>
    <p class="subtitle">A single round-trip mints a 200-byte receipt. The same artifact verifies offline, in 79 microseconds, on the customer's laptop today and an auditor's laptop years from now — no network, no trust required.</p>
