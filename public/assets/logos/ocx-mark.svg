<!-- OCX mark — a sealed square. The horizontal bar represents verification.
     Designed at 24×24 viewport, scales cleanly to any size. -->
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OCX">
  <rect x="2" y="2" width="20" height="20" rx="0" fill="#0A0A0A"/>
  <rect x="5" y="11.25" width="14" height="1.5" fill="#FAFAF7"/>
</svg>
