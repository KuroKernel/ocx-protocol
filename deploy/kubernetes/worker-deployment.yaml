# OCX Protocol Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocx-worker
  namespace: ocx-protocol
  labels:
    app.kubernetes.io/name: ocx-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: ocx-protocol
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocx-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ocx-worker
        app.kubernetes.io/name: ocx-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: ocx-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: ocx-worker
          image: ghcr.io/kurokernel/ocx-protocol:latest
          imagePullPolicy: Always
          command: ["/app/bin/ocx-worker"]

          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            - name: OCX_ENV
              value: "production"
            - name: OCX_WORKER_MODE
              value: "true"
            - name: OCX_BATCH_SIZE
              value: "100"
            - name: OCX_VERIFY_WORKERS
              value: "8"
            - name: OCX_DB_PATH
              value: "/app/data/ocx.db"
            - name: OCX_BADGER_PATH
              value: "/app/data/badger"
            - name: OCX_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ocx-secrets
                  key: redis-url
            - name: OCX_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: ocx-secrets
                  key: signing-key

          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi

          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          volumeMounts:
            - name: data
              mountPath: /app/data

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ocx-data-pvc

      terminationGracePeriodSeconds: 60
---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ocx-worker
  namespace: ocx-protocol
---
# Headless Service for workers
apiVersion: v1
kind: Service
metadata:
  name: ocx-worker
  namespace: ocx-protocol
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app: ocx-worker
