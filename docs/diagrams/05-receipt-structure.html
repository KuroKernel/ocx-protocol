<head>

  <title>OCX Receipt Structure · 11 fields, 200 bytes</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:  #f5f5f5;
      --color-ink:    #2d3142;
      --color-muted:  #4f5d75;
      --color-soft:   #7a8399;
      --color-accent: #059669;
      --font-sans:    'Geist', system-ui, sans-serif;
      --font-serif:   'Instrument Serif', serif;
      --font-mono:    'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }
    .frame { max-width: 1280px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.75rem, 2.6vw + 0.75rem, 2.25rem);
      font-weight: 400; letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--color-muted);
      margin-bottom: 1.75rem;
      max-width: 720px;
      line-height: 1.5;
    }
    svg { width: 100%; min-width: 1080px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Receipt Spec · Anatomy</p>
    <h1>What's inside the 200 bytes</h1>
    <p class="subtitle">Eleven canonical-CBOR fields. Ten describe the call; the eleventh is the Ed25519 signature over a domain-separated hash of the other ten. The whole thing fits in an HTTP header.</p>

          <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <line x1="80" y1="128" x2="640" y2="128" stroke="rgba(45,49,66,0.12)" stroke-width="0.8"/>
