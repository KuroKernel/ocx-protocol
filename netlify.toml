# OCX website build config — Netlify reads this from the repo root.
[build]
  base = "."
  publish = "build"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# API proxy — forward /api/* to the Railway backend. Must come before the
# SPA catchall (Netlify processes redirects in source order, first match wins).
# Pass-through: frontend already includes /v1/ in the path, so strip /api
# only and let the rest carry over. Server-side fetch from Netlify edge →
# Railway: same-origin from the browser's POV, so no CORS preflight needed.
[[redirects]]
  from = "/api/*"
  to = "https://ocx-api-production.up.railway.app/:splat"
  status = 200
  force = true

# SPA fallback — let React Router handle all paths (also enforced by public/_redirects)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache the built assets aggressively (filenames are content-hashed by CRA)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Diagrams + paper.pdf — long cache, but allow refresh on update
[[headers]]
  for = "/diagrams/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/paper.pdf"
  [headers.values]
    Cache-Control = "public, max-age=3600"

