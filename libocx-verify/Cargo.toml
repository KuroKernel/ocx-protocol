[package]
name = "libocx-verify"
version = "0.1.0"
edition = "2021"
description = "A lightweight, high-assurance verifier for OCX cryptographic receipts."
license = "Apache-2.0 OR MIT"
publish = false

[lib]
crate-type = ["cdylib", "staticlib", "rlib"] # For FFI, static linking, and Rust use.

[features]
default = ["ffi"]
ffi = []

[dependencies]
ring = { version = "0.17", default-features = false, features = ["std", "alloc"] } # Crypto primitives.
hex = "0.4" # Hex encoding for debug output.

[dev-dependencies]
tempfile = "3.0" # Temporary files for tests.

[build-dependencies]
cc = "1.0" # For compiling the C header shim.