apiVersion: v1
kind: Pod
metadata:
  name: ocx-sidecar-demo
  namespace: default
  annotations:
    ocx-inject: "verify"
    ocx-cycles: "25000"
  labels:
    app: ocx-sidecar-demo
spec:
  containers:
  - name: main-app
    image: nginx:alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
