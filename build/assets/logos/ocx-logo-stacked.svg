<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .primary-text { font-family: 'Times New Roman', serif; font-weight: 300; }
      .secondary-text { font-family: 'Helvetica Neue', sans-serif; font-weight: 400; }
      .stacked-stroke { stroke-width: 0.9; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Stacked Lockup -->
  <g id="ocx-logo-stacked">
    <!-- Centered hexagon -->
    <g transform="translate(20, 0)">
      <polygon points="20,7.5 25.49,11.25 25.49,18.75 20,22.5 14.51,18.75 14.51,11.25" 
               fill="none" 
               stroke="#000000" 
               class="stacked-stroke"/>
      <circle cx="20" cy="15" r="2" fill="#000000"/>
      <line x1="18.3" y1="15" x2="21.7" y2="15" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="square"/>
      <line x1="20" y1="13.3" x2="20" y2="16.7" stroke="#FFFFFF" stroke-width="0.9" stroke-linecap="square"/>
    </g>
    
    <!-- Stacked text -->
    <text x="0" y="40" class="primary-text" font-size="18" letter-spacing="-0.3px" fill="#000000">OCX</text>
    <text x="0" y="52" class="secondary-text" font-size="6" letter-spacing="1.2px" fill="#000000" opacity="0.85">PROTOCOL</text>
  </g>
</svg>
